<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BECAS MEDIGAMA</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main id="loginView" class="auth-page">
    <section class="brand-panel">
      <div class="brand-mark">BM</div>
      <h1>BECAS MEDIGAMA</h1>
      <p>Gestion moderna de solicitudes, evaluacion y resultados de becas estudiantiles.</p>
    </section>

    <section class="auth-card">
      <div class="section-head">
        <span>Acceso seguro</span>
        <h2>Inicio de sesion</h2>
      </div>

      <form id="loginForm" class="form-grid">
        <label>
          Correo
          <input id="loginEmail" type="text">
        </label>
        <label>
          Contrasena
          <input id="loginPass" type="password">
        </label>
        <button type="submit" class="primary">Ingresar</button>
      </form>

      <div class="auth-links">
        <button id="openStudentRegister" class="ghost">Crear cuenta de estudiante</button>
        <button id="openRecoverDialog" class="link-btn">Recuperar contrasena</button>
      </div>
      <p id="loginMsg" class="message"></p>
    </section>
  </main>

  <main id="appView" class="app hidden">
    <aside class="sidebar">
      <div>
        <div class="brand-mini">BM</div>
        <h2>Medigama</h2>
        <p id="sessionInfo"></p>
      </div>

      <nav id="navMenu"></nav>

      <button id="logoutBtn" class="ghost">Cerrar sesion</button>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div>
          <p id="sessionLine" class="session-line"></p>
          <span id="roleBadge" class="badge"></span>
          <h1 id="viewTitle">Panel</h1>
        </div>
      </header>

      <section id="content"></section>
    </section>
  </main>

  <dialog id="studentDialog">
    <form id="studentRegisterForm" class="dialog-card">
      <div class="section-head">
        <span>Solicitante</span>
        <h2>Crear cuenta</h2>
      </div>
      <div class="form-grid two">
        <label>Nombre completo <input name="nombre"></label>
        <label>Correo <input name="correo" type="text"></label>
        <label>Telefono <input name="telefono"></label>
        <label>Contrasena <input name="contrasena" type="password"></label>
      </div>
      <div class="actions">
        <button type="button" class="ghost" id="closeStudentDialog">Cancelar</button>
        <button type="submit" class="primary">Guardar</button>
      </div>
      <p id="studentRegisterMsg" class="message"></p>
    </form>
  </dialog>

  <dialog id="recoverDialog">
    <form id="recoverForm" class="dialog-card">
      <div class="section-head">
        <span>Recuperacion</span>
        <h2>Nueva contrasena</h2>
      </div>
      <div class="form-grid">
        <label>Correo registrado <input name="correo" type="text"></label>
        <label>Nueva contrasena <input name="nueva_contrasena" type="password"></label>
      </div>
      <div class="actions">
        <button type="button" class="ghost" id="closeRecoverDialog">Cancelar</button>
        <button type="submit" class="primary">Actualizar</button>
      </div>
      <p id="recoverMsg" class="message"></p>
    </form>
  </dialog>

  <script src="js/app.js"></script>
</body>
</html>
